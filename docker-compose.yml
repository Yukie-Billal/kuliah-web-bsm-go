version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: soundspace_db
    restart: always
    environment:
      MYSQL_DATABASE: soundspace
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
